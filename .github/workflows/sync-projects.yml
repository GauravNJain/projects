- name: Sync all projects
  shell: bash
  run: |
    sudo apt-get update
    sudo apt-get install -y jq

    set -euo pipefail

    jq -c '.[]' projects.json | while IFS= read -r row; do
      repo=$(jq -r '.repo' <<< "$row")
      output=$(jq -r '.output' <<< "$row")
      title=$(jq -r '.title' <<< "$row")

      mkdir -p "$(dirname "$output")"

      {
        echo "# $title"
        echo
        curl -fsSL "https://raw.githubusercontent.com/$repo/main/README.md"
      } > "$output"
    done
